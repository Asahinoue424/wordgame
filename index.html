<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实词大闯关 — 公务员考试·实词辨析1500词</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--card2:#334155;--gold:#f59e0b;--green:#10b981;--red:#ef4444;--blue:#3b82f6;--purple:#8b5cf6;--text:#e2e8f0;--text2:#94a3b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;align-items:center;user-select:none;-webkit-tap-highlight-color:transparent;}
.app{width:100%;max-width:600px;padding:20px;}
.screen{display:none;}
.screen.active{display:block;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.home{text-align:center;padding-top:40px;}
.home .logo{font-size:60px;margin-bottom:10px;}
.home h1{font-size:36px;background:linear-gradient(135deg,#f59e0b,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.home .subtitle{color:var(--text2);font-size:15px;margin-bottom:36px;}
.home .stats-bar{display:flex;gap:20px;justify-content:center;margin-bottom:36px;flex-wrap:wrap;}
.home .stat{background:var(--card);border-radius:16px;padding:16px 20px;min-width:80px;}
.home .stat .num{font-size:28px;font-weight:700;color:var(--gold);}
.home .stat .label{font-size:12px;color:var(--text2);margin-top:2px;}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:600;cursor:pointer;margin-bottom:12px;transition:all .2s;font-family:inherit;color:#fff;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,.3);}
.btn:active{transform:scale(.97);}
.btn.challenge{background:linear-gradient(135deg,#dc2626,#ef4444);}
.btn.practice{background:linear-gradient(135deg,#2563eb,#3b82f6);}
.btn.review{background:linear-gradient(135deg,#7c3aed,#8b5cf6);}
.btn.reset{background:var(--card2);color:var(--text2);font-size:14px;padding:12px;}
.btn.home-btn{background:var(--card2);}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.game-header .hearts{font-size:24px;display:flex;gap:4px;}
.game-header .hearts .heart.lost{opacity:.2;transform:scale(.7);filter:grayscale(1);}
.game-header .score-area{text-align:right;}
.game-header .score-area .score{font-size:28px;font-weight:700;color:var(--gold);}
.game-header .score-area .combo{font-size:13px;color:var(--green);min-height:18px;}
.game-header .score-area .combo.big{font-size:18px;animation:pulse .5s ease;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.progress-wrap{height:4px;background:var(--card2);border-radius:2px;margin-bottom:16px;overflow:hidden;}
.progress-wrap .bar{height:100%;background:var(--blue);border-radius:2px;transition:width .3s;}
.q-card{background:var(--card);border-radius:16px;padding:24px;margin-bottom:12px;border:2px solid transparent;transition:border-color .3s;}
.q-card.correct{border-color:var(--green);animation:flash-green .5s;}
.q-card.wrong{border-color:var(--red);animation:flash-red .5s;}
@keyframes flash-green{0%{background:rgba(16,185,129,.2)}100%{background:var(--card)}}
@keyframes flash-red{0%{background:rgba(239,68,68,.2)}100%{background:var(--card)}}
.q-card .q-num{font-size:12px;color:var(--text2);margin-bottom:8px;}
.q-card .q-text{font-size:20px;line-height:1.8;}
.q-card .q-text .blank{display:inline-block;min-width:80px;border-bottom:2px dashed var(--gold);margin:0 6px;text-align:center;color:var(--gold);}
.timer-bar{height:6px;background:var(--card2);border-radius:3px;margin-bottom:16px;overflow:hidden;}
.timer-bar .fill{height:100%;background:var(--green);border-radius:3px;transition:width .1s linear,background .3s;}
.timer-bar .fill.warning{background:var(--gold);}
.timer-bar .fill.danger{background:var(--red);}
.options{display:grid;gap:10px;}
.option{background:var(--card);border:2px solid var(--card2);border-radius:14px;padding:16px 20px;font-size:17px;cursor:pointer;transition:all .15s;font-family:inherit;color:var(--text);text-align:left;}
.option:hover{border-color:var(--blue);background:rgba(59,130,246,.08);}
.option:active{transform:scale(.97);}
.option.chosen-correct{border-color:var(--green);background:rgba(16,185,129,.15);}
.option.chosen-wrong{border-color:var(--red);background:rgba(239,68,68,.15);}
.option.show-correct{border-color:var(--green);}
.option.disabled{pointer-events:none;opacity:.7;}
.explain{background:var(--card);border-radius:16px;padding:18px;margin-top:12px;display:none;}
.explain.show{display:block;animation:fadeIn .3s;}
.explain .tip-label{font-size:13px;color:var(--blue);font-weight:600;margin-bottom:6px;}
.explain .tip-text{font-size:15px;line-height:1.7;color:var(--text2);}
.explain .next-hint{text-align:center;color:var(--text2);font-size:13px;margin-top:12px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}
.result{text-align:center;padding-top:20px;}
.result .emoji{font-size:70px;margin-bottom:10px;}
.result h2{font-size:28px;margin-bottom:6px;}
.result .sub{color:var(--text2);margin-bottom:24px;}
.result .res-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.result .res-item{background:var(--card);border-radius:16px;padding:16px;}
.result .res-item .val{font-size:26px;font-weight:700;}
.result .res-item .lbl{font-size:12px;color:var(--text2);}
.review-list{max-height:70vh;overflow-y:auto;}
.review-item{background:var(--card);border-radius:16px;padding:18px;margin-bottom:10px;border-left:4px solid var(--red);}
.review-item .q{font-size:16px;margin-bottom:6px;line-height:1.6;}
.review-item .a{font-size:14px;color:var(--green);}
.review-item .tip{font-size:13px;color:var(--text2);margin-top:4px;}
.review-empty{text-align:center;padding:60px 20px;color:var(--text2);}
.review-empty .icon{font-size:60px;margin-bottom:12px;}
@media(max-width:480px){.home h1{font-size:28px}.home .stats-bar{gap:10px}.home .stat{padding:12px 14px;min-width:60px}.home .stat .num{font-size:22px}.q-card .q-text{font-size:17px}.option{padding:14px 16px;font-size:15px}}
</style>
</head>
<body>
<div class="app">
<div class="screen active home" id="homeScreen">
<div class="logo">📚</div><h1>实词大闯关</h1><p class="subtitle">公务员考试 · 实词辨析1500词</p>
<div class="stats-bar">

<button class="btn challenge" onclick="startChallenge()">🔥 再来一局</button>
<button class="btn home-btn" onclick="goHome()">🏠 返回首页</button>
</div>
<div class="screen" id="reviewScreen">
<div style="text-align:center;margin-bottom:20px"><h2 style="font-size:24px;color:var(--purple)">📋 错题本</h2><p style="color:var(--text2);font-size:14px">答错的题目会自动收录</p></div>
<div class="review-list" id="reviewList"></div>
<button class="btn home-btn" style="display:block;width:100%;margin-top:12px" onclick="goHome()">🏠 返回首页</button>
</div>
</div>
<script>
const Q=[
{q:"我们__了四川雅砻江谷地的水利工程。",o:["考察","考查","考核"],a:0,t:"「考察」是实地观察调查；「考查」是按标准检查衡量；「考核」是审核查对，多用于人事。"},
{q:"学校每学期都会严格__学生的学业成绩。",o:["考察","考查","考核"],a:1,t:"按标准检查衡量成绩，用「考查」。"},
{q:"祖冲之经过认真的实际__，推翻了前人的错误结论。",o:["考察","考查","考核"],a:2,t:"审核、核对、查对用「考核」。"},
{q:"这种情况，他已经实地__过了。",o:["考问","拷问"],a:0,t:"「考问」是考察询问；「拷问」是拷打审问，含暴力。"},
{q:"在严刑__面前，他只好屈招了供。",o:["考问","拷问"],a:1,t:"拷打审问用「拷问」。"},
{q:"我们__了三年自然灾害带来的巨大困难。",o:["克服","克复"],a:0,t:"「克服」是用意志战胜困难/缺点；「克复」是武力夺回失地。"},
{q:"人民解放军__洛阳，粉碎了敌人的封锁。",o:["克服","克复"],a:1,t:"用武力夺回被占领的地方用「克复」。"},
{q:"战士们夜以继日地奋战，简直__极了。",o:["渴睡","瞌睡"],a:0,t:"「渴睡」是极度困倦、急需睡觉（程度重）；「瞌睡」是困倦打盹（状态轻）。"},
{q:"他一上课就打__，听不进老师讲课。",o:["渴睡","瞌睡"],a:1,t:"困倦打盹用「瞌睡」。"},
{q:"他忍受了半辈子的__，三天三夜也说不完。",o:["苦楚","苦处"],a:0,t:"「苦楚」侧重生活受折磨的主观痛苦感受；「苦处」侧重所受痛苦的客观所在。"},
{q:"这是先生的__，也是先生的好处，旁人无法体会。",o:["苦楚","苦处"],a:1,t:"痛苦的所在或根源用「苦处」。"},
{q:"他指着自己的名牌衣料__不止。",o:["夸示","夸饰"],a:0,t:"「夸示」是向人炫耀自己的东西/长处；「夸饰」是夸张地描绘事物。"},
{q:"他在文章里大事__那里的情景。",o:["夸示","夸饰"],a:1,t:"夸张地描绘用「夸饰」。"},
{q:"我国政府代表团访问朝鲜，受到了盛情__。",o:["款待","宽大","宽贷"],a:0,t:"「款待」是优厚招待；「宽大」是从宽处理；「宽贷」是宽容饶恕。"},
{q:"对于主动投降的敌人，我们采取__政策。",o:["款待","宽大","宽贷"],a:1,t:"从宽处理用「宽大」。"},
{q:"对愿意改正的同志，要给予__。",o:["款待","宽大","宽贷"],a:2,t:"宽容、饶恕用「宽贷」。"},
{q:"今日得__，终于可以好好休息了。",o:["宽馀","宽裕"],a:0,t:"「宽馀」侧重抽象事物的舒畅宽绰；「宽裕」侧重经济上的宽绰富裕。"},
{q:"新政策颁布后，这里的农民逐步__起来了。",o:["宽馀","宽裕"],a:1,t:"经济上宽绰富裕用「宽裕」。"},
{q:"少年儿童如果贪玩，就会__学业。",o:["旷废","旷费"],a:0,t:"「旷废」是耽误、荒废；「旷费」是浪费。"},
{q:"做事要高效，不能__时间。",o:["旷废","旷费"],a:1,t:"浪费（时间等）用「旷费」。"},
{q:"上海地方那么大，__你不知道他的地址，怎么找到他？",o:["况且","何况","而且"],a:0,t:"「况且」追加理由，表递进；「何况」用反问表递进；「而且」表一般递进。"},
{q:"他连最基本的字都不认识，更__写文章了。",o:["况且","何况","而且"],a:1,t:"用反问语气表递进，用「何况」。"},
{q:"产品质量提高了，款式新颖了，__包装也精美了。",o:["况且","何况","而且"],a:2,t:"表进一步，常与「不但」呼应，用「而且」。"},
{q:"我们要严格__项目的成本预算。",o:["控制","抑制","克制"],a:0,t:"「控制」指掌握住不使越界；「抑制」指压下去；「克制」专指抑制情感。"},
{q:"他__不住内心的喜悦，忽地站起来大呼。",o:["控制","抑制","克制"],a:1,t:"压下去（情绪、生理等）用「抑制」。"},
{q:"面对挑衅，他始终采取__的态度。",o:["控制","抑制","克制"],a:2,t:"抑制情感用「克制」。"},
{q:"商场营业额一直很低，__得做做市场调查。",o:["看来","可见"],a:0,t:"「看来」是主观推测；「可见」是由事实推导出结论。"},
{q:"由此__，这次事故是思想麻痹造成的。",o:["看来","可见"],a:1,t:"由事实推导出结论用「可见」。"},
{q:"我们要不断__新的业务领域。",o:["开拓","开辟"],a:0,t:"「开拓」是从小到大发展、扩大；「开辟」是从无到有打开新路径。"},
{q:"北京航空公司又__了几条新航线。",o:["开拓","开辟"],a:1,t:"从无到有开创用「开辟」。"},
{q:"小张待人是__的，但执行制度特别严格。",o:["宽厚","忠厚"],a:0,t:"「宽厚」是待人宽大厚道；「忠厚」是性情忠实厚道。"},
{q:"他是个__老实的人，从来不说假话。",o:["宽厚","忠厚"],a:1,t:"性情忠实厚道用「忠厚」。"},
{q:"华盛顿等地警方__加强了安全戒备。",o:["刻意","蓄意","特意"],a:0,t:"「刻意」是用尽心思（褒）；「蓄意」是早有坏心思（贬）；「特意」是特地（中性）。"},
{q:"某国一再__制造事端，企图引发军事冲突。",o:["刻意","蓄意","特意"],a:1,t:"早有坏意图用「蓄意」（贬义）。"},
{q:"这块衣料是他__托人从上海买来送给你的。",o:["刻意","蓄意","特意"],a:2,t:"特地、专为某事用「特意」。"},
{q:"相比薪酬，他们更__用人单位的发展空间。",o:["看重","看中"],a:0,t:"「看重」是重视、认为重要；「看中」是看了感到合意、满意。"},
{q:"你__哪个就买哪个，不用犹豫。",o:["看重","看中"],a:1,t:"看了感到合意用「看中」。"},
{q:"第二种是一位普通高中生的__。",o:["看法","管见"],a:0,t:"「看法」是普通见解；「管见」是谦辞，自谦浅陋的见识。"},
{q:"以上只是我的__，仅供大家参考。",o:["看法","管见"],a:1,t:"自谦见识浅陋用「管见」。"},
{q:"他花了十年时间__这部古籍的讹误。",o:["考订","考证"],a:0,t:"「考订」是考据并订正错误；「考证」是考核证实、说明问题。"},
{q:"我们不赞成在文献的__中无目的地转圈子。",o:["考订","考证"],a:1,t:"根据资料考核证实用「考证」。"},
{q:"他又把老师和同学们__的劝告忘得一干二净。",o:["苦口婆心","语重心长"],a:0,t:"「苦口婆心」是再三恳切劝告；「语重心长」是言辞诚恳、情意深长。"},
{q:"老师__地叮嘱我们，要珍惜学习时光。",o:["苦口婆心","语重心长"],a:1,t:"言辞诚恳、情意深长用「语重心长」。"},
{q:"这部小说成功__了一个鲜活的人物形象。",o:["刻画","刻划"],a:0,t:"用文字、画面描写塑造用「刻画」。除雕刻行为外统一用「刻画」。"},
{q:"工匠在石碑上__了精美的花纹。",o:["刻画","刻划"],a:1,t:"雕刻、刻制的具体动作用「刻划」。"},
{q:"运动量大，我的心脏就跳得__。",o:["厉害","利害"],a:0,t:"「厉害」是形容词，表猛烈/剧烈；「利害」是名词，表利益与危害。"},
{q:"同学们之间没有根本的__冲突。",o:["厉害","利害"],a:1,t:"利益和危害的关系用「利害」（名词）。"},
{q:"这份粮油调拨单需要__盖章才能有效。",o:["粮站","粮栈"],a:0,t:"「粮站」是调拨管理粮食的行政机关；「粮栈」是批发粮店/存粮货栈。"},
{q:"为方便群众，小区新设了__。",o:["粮站","粮栈"],a:1,t:"经营粮食批发的店铺用「粮栈」。"},
{q:"我们__三点出发，赶最早的一班火车。",o:["凌晨","零辰"],a:0,t:"「凌晨」是天快亮的时段；「零辰」特指夜里12点整。"},
{q:"今天夜间__就出发，务必准时集合。",o:["凌晨","零辰"],a:1,t:"夜里12点整用「零辰」。"},
{q:"他虽然是英国人，但汉语说得很__。",o:["流利","流丽"],a:0,t:"「流利」是说话通畅、动作灵活；「流丽」是诗文/书法流畅华美。"},
{q:"王先生书法__，深受大家喜爱。",o:["流利","流丽"],a:1,t:"书法流畅华美用「流丽」。"},
{q:"植树造林，防止水土__。",o:["流失","流逝"],a:0,t:"「流失」是物质/人才散失；「流逝」是时光像流水般消逝。"},
{q:"时光在不知不觉中__了。",o:["流失","流逝"],a:1,t:"时光消逝用「流逝」。"},
{q:"孔子对着__的江水感叹：逝者如斯夫，不舍昼夜。",o:["流逝","流泻"],a:0,t:"时光消逝用「流逝」。"},
{q:"月光从云层中__下来，洒满了大地。",o:["流逝","流泻"],a:1,t:"液体/光线快速流出用「流泻」。"},

{q:"这段经历是__的，没有半点编造。",o:["如实","真实"],a:1,t:"与客观事实相符合用「真实」。"},

{q:"我们正在__下半年的工作计划。",o:["制定","制订"],a:1,t:"还在拟定过程中，尚未最终确定，用「制订」。"},

{q:"这条公路__了三个省份。",o:["贯穿","贯串"],a:0,t:"「贯穿」侧重于穿过、连通；「贯串」侧重于串连在一起。"},

{q:"这个项目__更多的时间来完成。",o:["需要","须要"],a:0,t:"「需要」是应该有或必须有；「须要」是一定要、必须要。"},

{q:"社会保障制度是人民生活的__。",o:["保障","保证"],a:0,t:"「保障」是保护使不受侵害；「保证」是担保做到。"},

{q:"这家公司__破产的边缘。",o:["濒临","面临"],a:0,t:"「濒临」是紧靠着、临近（多用于不好事物）；「面临」是面前遇到。"},
{q:"这篇文章还需要进一步__。",o:["修饰","粉饰"],a:0,t:"「修饰」是修整装饰使美观（中性）；「粉饰」是美化表面掩盖问题（含贬义）。"},
{q:"加强家校__，共同培养学生。",o:["沟通","勾通"],a:0,t:"「沟通」是使双方能通连（中性/褒义）；「勾通」是暗中勾结串通（贬义）。"},
];

const TQ=20,TPQ=12,BS=100,TBM=50,CB=20;
let S={mode:null,qs:[],i:0,score:0,combo:0,mc:0,lives:5,cc:0,wc:0,ad:!1,timer:null,tl:0};
function ld(){try{return JSON.parse(localStorage.getItem('wg_s')||'{"tq":0,"bc":0}')}catch(e){return{tq:0,bc:0}}}
function ss(d){localStorage.setItem('wg_s',JSON.stringify(d))}
function lw(){try{return JSON.parse(localStorage.getItem('wg_w')||'[]')}catch(e){return[]}}
function sw(d){localStorage.setItem('wg_w',JSON.stringify(d))}
function sf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}
function pr(a,n){return sf(a).slice(0,Math.min(n,a.length))}
function rh(){const s=ld();document.getElementById('statTotal').textContent=s.tq||0;document.getElementById('statBest').textContent=s.bc||0;document.getElementById('statWrong').textContent=lw().length}
function sc(){startGame('challenge')}
function sp(){startGame('practice')}
function startGame(m){S={mode:m,qs:pr(Q,TQ),i:0,score:0,combo:0,mc:0,lives:m==='challenge'?5:999,cc:0,wc:0,ad:!1,timer:null,tl:TPQ};showScreen('gameScreen');rHearts();uScore();sq()}
function showScreen(id){['homeScreen','gameScreen','resultScreen','reviewScreen'].forEach(s=>document.getElementById(s).classList.remove('active'));document.getElementById(id).classList.add('active')}
function rHearts(){if(S.mode==='practice'){document.getElementById('hearts').innerHTML='<span style="font-size:14px;color:var(--blue);line-height:1.8">∞ 练习模式</span>';return}let h='';for(let i=0;i<5;i++)h+=`<span class="heart${i>=S.lives?' lost':''}">❤️</span>`;document.getElementById('hearts').innerHTML=h}
function uScore(){document.getElementById('scoreDisplay').textContent=S.score;const cd=document.getElementById('comboDisplay');if(S.combo>=3){cd.textContent=`🔥 ${S.combo}连击! +${CB*(S.combo-1)}`;cd.className='combo big';setTimeout(()=>cd.className='combo',500)}else if(S.combo>0){cd.textContent=S.combo>=2?`连击 x${S.combo}`:'';cd.className='combo'}else{cd.textContent='';cd.className='combo'}}
function sq(){if(S.i>=S.qs.length)return endGame(!0);const q=S.qs[S.i];S.ad=!1;S.tl=TPQ;document.getElementById('progressBar').style.width=(S.i/TQ*100)+'%';document.getElementById('qNum').textContent=`第 ${S.i+1}/${TQ} 题`;document.getElementById('qText').innerHTML=q.q.replace(/__/g,'<span class="blank">______</span>');document.getElementById('qCard').className='q-card';document.getElementById('explain').className='explain';const sh=q.o.map((w,i)=>({w,i})).sort(()=>Math.random()-0.5);document.getElementById('options').innerHTML=sh.map((it,idx)=>`<button class="option" data-idx="${idx}" data-correct="${it.i===q.a}" data-word="${it.w}">${it.w}</button>`).join('');document.querySelectorAll('#options .option').forEach(b=>{b.addEventListener('click',()=>ha(b))});document.onkeydown=function(e){if(S.ad){if(e.key==='Enter'||e.key===' '){nq();e.preventDefault()}return}const k=parseInt(e.key);if(k>=1&&k<=sh.length){const b=document.querySelectorAll('#options .option')[k-1];if(b)ha(b)}};st()}
function st(){clearInterval(S.timer);const f=document.getElementById('timerFill');f.style.width='100%';f.className='fill';const sT=Date.now(),tM=TPQ*1000;S.timer=setInterval(()=>{const r=Math.max(0,tM-(Date.now()-sT));S.tl=r/1000;const p=r/tM*100;f.style.width=p+'%';if(p<30)f.className='fill danger';else if(p<55)f.className='fill warning';if(r<=0){clearInterval(S.timer);if(!S.ad)tu()}},100)}
function tu(){if(S.ad)return;S.ad=!0;clearInterval(S.timer);const q=S.qs[S.i];document.querySelectorAll('#options .option').forEach(b=>{b.classList.add('disabled');if(b.dataset.correct==='true')b.classList.add('show-correct')});S.combo=0;S.wc++;uScore();document.getElementById('qCard').classList.add('wrong');if(S.mode==='challenge'){S.lives--;rHearts();if(S.lives<=0){setTimeout(()=>endGame(!1),1200);return}}aw(q);se(q,!0)}
function ha(b){if(S.ad)return;S.ad=!0;clearInterval(S.timer);const ok=b.dataset.correct==='true';const q=S.qs[S.i];document.querySelectorAll('#options .option').forEach(bt=>{bt.classList.add('disabled');if(bt.dataset.correct==='true')bt.classList.add('show-correct')});const tB=Math.floor((S.tl/TPQ)*TBM);const cB=S.combo>=2?CB*(S.combo-1):0;if(ok){S.combo++;S.cc++;if(S.combo>S.mc)S.mc=S.combo;S.score+=BS+tB+cB;document.getElementById('qCard').classList.add('correct');b.classList.add('chosen-correct')}else{S.combo=0;S.wc++;if(S.mode==='challenge'){S.lives--;rHearts()}document.getElementById('qCard').classList.add('wrong');b.classList.add('chosen-wrong');aw(q)}uScore();if(S.mode==='challenge'&&S.lives<=0){setTimeout(()=>endGame(!1),1200);se(q,!ok);return}se(q,!ok)}
function se(q,shT){const el=document.getElementById('explain');el.innerHTML=`<div class="tip-label">✅ 正确答案：${q.o[q.a]}</div><div class="tip-text">💡 ${q.t}</div><div class="next-hint">按 Enter 或点击屏幕继续 →</div>`;el.classList.add('show');setTimeout(()=>document.addEventListener('click',function gn(){document.removeEventListener('click',gn);nq()}),200)}
function nq(){S.i++;if(S.i>=S.qs.length)endGame(!0);else{document.getElementById('explain').classList.remove('show');sq()}}
function endGame(comp){clearInterval(S.timer);S.ad=!0;const stats=ld();stats.tq=(stats.tq||0)+S.cc+S.wc;if(S.mc>(stats.bc||0))stats.bc=S.mc;ss(stats);const acc=S.cc+S.wc>0?Math.round(S.cc/(S.cc+S.wc)*100):0;const em=document.getElementById('resultEmoji'),ti=document.getElementById('resultTitle'),su=document.getElementById('resultSub');if(S.mode==='challenge'&&S.lives<=0){em.textContent='💔';ti.textContent='闯关失败';su.textContent=`答对了 ${S.cc} 题`}else if(acc>=90){em.textContent='🏆';ti.textContent='太厉害了！';su.textContent=`正确率 ${acc}%`}else if(acc>=70){em.textContent='👍';ti.textContent='表现不错！';su.textContent=`正确率 ${acc}%`}else if(acc>=50){em.textContent='📖';ti.textContent='还需努力';su.textContent=`正确率 ${acc}%`}else{em.textContent='💪';ti.textContent='继续加油';su.textContent=`正确率 ${acc}%`}document.getElementById('resScore').textContent=S.score;document.getElementById('resCorrect').textContent=S.cc;document.getElementById('resWrong').textContent=S.wc;document.getElementById('resStreak').textContent=S.mc;showScreen('resultScreen')}
function aw(q){const b=lw();if(!b.some(it=>it.q===q.q&&it.o.join(',')===q.o.join(','))){b.push(q);sw(b)}}
function showReview(){const b=lw();const l=document.getElementById('reviewList');if(b.length===0){l.innerHTML='<div class="review-empty"><div class="icon">🎉</div><p>还没有错题，继续保持！</p></div>'}else{l.innerHTML=b.reverse().map((q,i)=>`<div class="review-item"><div class="q">${b.length-i}. ${q.q.replace(/__/g,'____')}</div><div class="a">✅ <b>${q.o[q.a]}</b></div><div class="tip">💡 ${q.t}</div></div>`).join('')}showScreen('reviewScreen')}
function goHome(){clearInterval(S.timer);rh();showScreen('homeScreen');document.onkeydown=null}
function resetData(){if(confirm('确定要清除所有记录和错题本吗？此操作不可恢复！')){localStorage.removeItem('wg_s');localStorage.removeItem('wg_w');rh()}}
rh();
</script>
</body>
