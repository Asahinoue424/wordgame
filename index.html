<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实词大闯关 — 公务员考试·实词辨析</title>
<style>
:root {
  --bg: #0f172a; --card: #1e293b; --card2: #334155;
  --gold: #f59e0b; --green: #10b981; --red: #ef4444;
  --blue: #3b82f6; --purple: #8b5cf6; --text: #e2e8f0; --text2: #94a3b8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; justify-content: center; align-items: center;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.app { width: 100%; max-width: 600px; padding: 20px; }
.screen { display: none; }
.screen.active { display: block; animation: fadeIn .35s ease; }
@keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

/* 首页 */
.home { text-align: center; padding-top: 40px; }
.home .logo { font-size: 60px; margin-bottom: 10px; }
.home h1 { font-size: 36px; background: linear-gradient(135deg, #f59e0b, #fbbf24, #f59e0b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
.home .subtitle { color: var(--text2); font-size: 15px; margin-bottom: 36px; }
.home .stats-bar { display: flex; gap: 20px; justify-content: center; margin-bottom: 36px; flex-wrap: wrap; }
.home .stat { background: var(--card); border-radius: 16px; padding: 16px 20px; min-width: 80px; }
.home .stat .num { font-size: 28px; font-weight: 700; color: var(--gold); }
.home .stat .label { font-size: 12px; color: var(--text2); margin-top: 2px; }
.btn { display: block; width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 18px; font-weight: 600; cursor: pointer; margin-bottom: 12px; transition: all .2s; font-family: inherit; color: #fff; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,.3); }
.btn:active { transform: scale(.97); }
.btn.challenge { background: linear-gradient(135deg, #dc2626, #ef4444); }
.btn.practice { background: linear-gradient(135deg, #2563eb, #3b82f6); }
.btn.review { background: linear-gradient(135deg, #7c3aed, #8b5cf6); }
.btn.reset { background: var(--card2); color: var(--text2); font-size: 14px; padding: 12px; }
.btn.home-btn { background: var(--card2); }

/* 游戏界面 */
.game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.game-header .hearts { font-size: 24px; display: flex; gap: 4px; }
.game-header .hearts .heart.lost { opacity: .2; transform: scale(.7); filter: grayscale(1); }
.game-header .score-area { text-align: right; }
.game-header .score-area .score { font-size: 28px; font-weight: 700; color: var(--gold); }
.game-header .score-area .combo { font-size: 13px; color: var(--green); min-height: 18px; }
.game-header .score-area .combo.big { font-size: 18px; animation: pulse .5s ease; }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.4); } }
.progress-wrap { height: 4px; background: var(--card2); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
.progress-wrap .bar { height: 100%; background: var(--blue); border-radius: 2px; transition: width .3s; }
.q-card { background: var(--card); border-radius: 16px; padding: 24px; margin-bottom: 12px; border: 2px solid transparent; transition: border-color .3s; }
.q-card.correct { border-color: var(--green); animation: flash-green .5s; }
.q-card.wrong { border-color: var(--red); animation: flash-red .5s; }
@keyframes flash-green { 0% { background: rgba(16,185,129,.2); } 100% { background:var(--card); } }
@keyframes flash-red { 0% { background: rgba(239,68,68,.2); } 100% { background:var(--card); } }
.q-card .q-num { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.q-card .q-text { font-size: 20px; line-height: 1.8; }
.q-card .q-text .blank { display: inline-block; min-width: 80px; border-bottom: 2px dashed var(--gold); margin: 0 6px; text-align: center; color: var(--gold); }
.timer-bar { height: 6px; background: var(--card2); border-radius: 3px; margin-bottom: 16px; overflow: hidden; }
.timer-bar .fill { height: 100%; background: var(--green); border-radius: 3px; transition: width .1s linear, background .3s; }
.timer-bar .fill.warning { background: var(--gold); }
.timer-bar .fill.danger { background: var(--red); }
.options { display: grid; gap: 10px; }
.option { background: var(--card); border: 2px solid var(--card2); border-radius: 14px; padding: 16px 20px; font-size: 17px; cursor: pointer; transition: all .15s; font-family: inherit; color: var(--text); text-align: left; }
.option:hover { border-color: var(--blue); background: rgba(59,130,246,.08); }
.option:active { transform: scale(.97); }
.option.chosen-correct { border-color: var(--green); background: rgba(16,185,129,.15); }
.option.chosen-wrong { border-color: var(--red); background: rgba(239,68,68,.15); }
.option.show-correct { border-color: var(--green); }
.option.disabled { pointer-events: none; opacity: .7; }
.explain { background: var(--card); border-radius: 16px; padding: 18px; margin-top: 12px; display: none; }
.explain.show { display: block; animation: fadeIn .3s; }
.explain .tip-label { font-size: 13px; color: var(--blue); font-weight: 600; margin-bottom: 6px; }
.explain .tip-text { font-size: 15px; line-height: 1.7; color: var(--text2); }
.explain .next-hint { text-align: center; color: var(--text2); font-size: 13px; margin-top: 12px; animation: blink 1s infinite; }
@keyframes blink { 0%,100% { opacity:.5; } 50% { opacity:1; } }

/* 结算 */
.result { text-align: center; padding-top: 20px; }
.result .emoji { font-size: 70px; margin-bottom: 10px; }
.result h2 { font-size: 28px; margin-bottom: 6px; }
.result .sub { color: var(--text2); margin-bottom: 24px; }
.result .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.result .res-item { background: var(--card); border-radius: 16px; padding: 16px; }
.result .res-item .val { font-size: 26px; font-weight: 700; }
.result .res-item .lbl { font-size: 12px; color: var(--text2); }

/* 错题本 */
.review-list { max-height: 70vh; overflow-y: auto; }
.review-item { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 10px; border-left: 4px solid var(--red); }
.review-item .q { font-size: 16px; margin-bottom: 6px; line-height: 1.6; }
.review-item .a { font-size: 14px; color: var(--green); }
.review-item .tip { font-size: 13px; color: var(--text2); margin-top: 4px; }
.review-empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.review-empty .icon { font-size: 60px; margin-bottom: 12px; }

@media (max-width: 480px) {
  .home h1 { font-size: 28px; }
  .home .stats-bar { gap: 10px; }
  .home .stat { padding: 12px 14px; min-width: 60px; }
  .home .stat .num { font-size: 22px; }
  .q-card .q-text { font-size: 17px; }
  .option { padding: 14px 16px; font-size: 15px; }
}
</style>
</head>
<body>

<div class="app">
  <div class="screen active home" id="homeScreen">
    <div class="logo">📚</div>
    <h1>实词大闯关</h1>
    <p class="subtitle">公务员考试 · 实词辨析专项训练</p>
    <div class="stats-bar">
      <div class="stat"><div class="num" id="statTotal">0</div><div class="label">累计答题</div></div>
      <div class="stat"><div class="num" id="statBest">0</div><div class="label">最高连击</div></div>
      <div class="stat"><div class="num" id="statWrong">0</div><div class="label">错题本</div></div>
    </div>
    <button class="btn challenge" onclick="startChallenge()">🔥 闯关模式</button>
    <button class="btn practice" onclick="startPractice()">📝 练习模式</button>
    <button class="btn review" onclick="showReview()">📋 错题本</button>
    <button class="btn reset" onclick="resetData()">🔄 重置记录</button>
  </div>

  <div class="screen" id="gameScreen">
    <div class="game-header">
      <div class="hearts" id="hearts"></div>
      <div class="score-area">
        <div class="score" id="scoreDisplay">0</div>
        <div class="combo" id="comboDisplay"></div>
      </div>
    </div>
    <div class="progress-wrap"><div class="bar" id="progressBar" style="width:0%"></div></div>
    <div class="timer-bar"><div class="fill" id="timerFill" style="width:100%"></div></div>
    <div class="q-card" id="qCard">
      <div class="q-num" id="qNum"></div>
      <div class="q-text" id="qText"></div>
    </div>
    <div class="options" id="options"></div>
    <div class="explain" id="explain"></div>
  </div>

  <div class="screen result" id="resultScreen">
    <div class="emoji" id="resultEmoji"></div>
    <h2 id="resultTitle"></h2>
    <p class="sub" id="resultSub"></p>
    <div class="res-grid">
      <div class="res-item"><div class="val" style="color:var(--gold)" id="resScore">0</div><div class="lbl">总分</div></div>
      <div class="res-item"><div class="val" style="color:var(--green)" id="resCorrect">0</div><div class="lbl">答对</div></div>
      <div class="res-item"><div class="val" style="color:var(--red)" id="resWrong">0</div><div class="lbl">答错</div></div>
      <div class="res-item"><div class="val" style="color:var(--blue)" id="resStreak">0</div><div class="lbl">最高连击</div></div>
    </div>
    <button class="btn challenge" onclick="startChallenge()">🔥 再来一局</button>
    <button class="btn home-btn" onclick="goHome()">🏠 返回首页</button>
  </div>

  <div class="screen" id="reviewScreen">
    <div style="text-align:center;margin-bottom:20px">
      <h2 style="font-size:24px;color:var(--purple)">📋 错题本</h2>
      <p style="color:var(--text2);font-size:14px">答错的题目会自动收录</p>
    </div>
    <div class="review-list" id="reviewList"></div>
    <button class="btn home-btn" style="display:block;width:100%;margin-top:12px" onclick="goHome()">🏠 返回首页</button>
  </div>
</div>

<script>
// ===================== 题库 =====================
const WORD_BANK = [
  // ── 必须 / 必需 ──
  {q:"想要考上公务员，__付出持续的努力。",opts:["必须","必需"],ans:0,tip:"「必须」是副词，强调事理上的必要；「必需」是动词/形容词，指一定要有的、不可少的。"},
  {q:"水和食物是维持生命的__品。",opts:["必须","必需"],ans:1,tip:"「必需」作定语修饰名词，表示不可缺少的；「必须」一般不作定语。"},
  {q:"这项工作__在三天内完成。",opts:["必须","必需"],ans:0,tip:"「必须」后面跟动词，强调一定要做。"},
  {q:"身份证是办理手续时__出示的证件。",opts:["必须","必需"],ans:0,tip:"此处修饰动词「出示」，用副词「必须」。"},

  // ── 反映 / 反应 ──
  {q:"这部电影__了当代年轻人的生活状态。",opts:["反映","反应"],ans:0,tip:"「反映」是把客观事物的实质表现出来；「反应」是受到刺激后作出的回应。"},
  {q:"吃了药之后，身体出现了不良__。",opts:["反映","反应"],ans:1,tip:"「反应」指机体对外界刺激的回应。"},
  {q:"群众的意见要及时向上级__。",opts:["反映","反应"],ans:0,tip:"向上级汇报情况用「反映」。"},
  {q:"他的演讲引起了强烈的__。",opts:["反映","反应"],ans:1,tip:"引起的回应、反响用「反应」。"},

  // ── 启示 / 启事 ──
  {q:"这个寓言故事给了我们深刻的__。",opts:["启示","启事"],ans:0,tip:"「启示」是启发、让人领悟道理；「启事」是公开声明，如寻人启事。"},
  {q:"他在报纸上登了一则寻人__。",opts:["启示","启事"],ans:1,tip:"「启事」是公开的文字告示。"},
  {q:"历史留给我们的__是：落后就要挨打。",opts:["启示","启事"],ans:0,tip:"「启示」指启发领悟的道理。"},

  // ── 制定 / 制订 ──
  {q:"国家__了一系列保护环境的法律法规。",opts:["制定","制订"],ans:0,tip:"「制定」指定出（法律、规程、计划等），强调确定下来；「制订」侧重创制拟定的过程。"},
  {q:"我们正在__下半年的工作计划。",opts:["制定","制订"],ans:1,tip:"还在拟定过程中，尚未最终确定，用「制订」。"},
  {q:"新的课程标准已经__完毕并正式实施。",opts:["制定","制订"],ans:0,tip:"已经定案并实施，用「制定」。"},
  {q:"经过反复讨论，最终__了这套方案。",opts:["制定","制订"],ans:0,tip:"强调最终确定下来，用「制定」。"},

  // ── 盈利 / 营利 ──
  {q:"这家公司今年实现了可观的__。",opts:["盈利","营利"],ans:0,tip:"「盈利」是名词，指获得的利润；「营利」是动词，指谋求利润。"},
  {q:"公立医院不以__为目的。",opts:["盈利","营利"],ans:1,tip:"「营利」是动词，指追求利润的行为。"},
  {q:"企业需要__才能持续发展。",opts:["盈利","营利"],ans:0,tip:"此处需要名词表示「利润」，用「盈利」。"},

  // ── 权利 / 权力 ──
  {q:"公民有受教育的__。",opts:["权利","权力"],ans:0,tip:"「权利」是公民依法享有的利益和自由；「权力」是政治上的强制力量或职责范围内的支配力。"},
  {q:"政府机关行使行政管理__。",opts:["权利","权力"],ans:1,tip:"政府机关的支配和管理力量是「权力」。"},
  {q:"消费者有权维护自己的合法__。",opts:["权利","权力"],ans:0,tip:"消费者享有的利益和保障是「权利」。"},
  {q:"不能滥用手中的__谋取私利。",opts:["权利","权力"],ans:1,tip:"手中的支配力量、职权是「权力」。"},

  // ── 法治 / 法制 ──
  {q:"我们要建设社会主义__国家。",opts:["法治","法制"],ans:0,tip:"「法治」是治理国家的一种方略，强调依法治理；「法制」指法律制度本身。"},
  {q:"健全社会主义__体系。",opts:["法治","法制"],ans:1,tip:"「法制」是法律制度的统称。"},
  {q:"推进国家治理体系现代化，必须坚持全面__。",opts:["法治","法制"],ans:0,tip:"「法治」是治理方式，与「人治」相对。"},

  // ── 贯穿 / 贯串 ──
  {q:"这条公路__了三个省份。",opts:["贯穿","贯串"],ans:0,tip:"「贯穿」侧重于穿过、连通，多用于具体事物；「贯串」侧重于串连在一起，多用于抽象事物。"},
  {q:"爱国主义精神__了整个主题教育活动。",opts:["贯穿","贯串"],ans:0,tip:"「贯穿」用于抽象事物表示从头到尾，更为常用。"},
  {q:"用一根主线把各个故事情节__起来。",opts:["贯穿","贯串"],ans:1,tip:"把分散的东西串成一个整体，用「贯串」更贴切。"},

  // ── 考察 / 考查 ──
  {q:"中央领导到地方__工作。",opts:["考察","考查"],ans:0,tip:"「考察」是实地观察调查；「考查」是用一定的标准来检查衡量。"},
  {q:"期末考试是用来__学生一学期的学习成果。",opts:["考察","考查"],ans:1,tip:"用考试等手段检验衡量，用「考查」。"},
  {q:"这批干部将被派往基层__锻炼。",opts:["考察","考查"],ans:0,tip:"实地观察了解情况用「考察」。"},

  // ── 学历 / 学力 ──
  {q:"招聘要求本科及以上__。",opts:["学历","学力"],ans:0,tip:"「学历」指学习的经历，如在哪些学校毕业；「学力」指学习能力、学问水平。"},
  {q:"同等__者可以申请报考。",opts:["学历","学力"],ans:1,tip:"「同等学力」是固定用法，指同等的学习能力和知识水平。"},

  // ── 出身 / 出生 ──
  {q:"他__在一个普通的工人家庭。",opts:["出身","出生"],ans:1,tip:"「出生」指胎儿从母体分离出来，后面可接时间/地点；「出身」指由家庭背景决定的社会身份。"},
  {q:"他是军人__，做事雷厉风行。",opts:["出身","出生"],ans:0,tip:"「出身」指家庭背景或早期经历所决定的身份。"},

  // ── 定金 / 订金 ──
  {q:"购房时缴纳的__具有担保效力，违约不退还。",opts:["定金","订金"],ans:0,tip:"「定金」是法律概念，有担保效力，违约不退；「订金」是预付款，一般可退。"},
  {q:"先付一部分__预订，到货再付尾款。",opts:["定金","订金"],ans:1,tip:"预订商品付的预付款，一般无担保性质，用「订金」。"},

  // ── 实行 / 施行 ──
  {q:"新政策将于明年1月1日起__。",opts:["实行","施行"],ans:1,tip:"「施行」指法令、规章等公布后从某时起生效；「实行」是用行动来实现。"},
  {q:"这项改革措施已经在三个城市试点__。",opts:["实行","施行"],ans:0,tip:"实际执行、落实用「实行」。"},

  // ── 需要 / 须要 ──
  {q:"这个项目__更多的时间来完成。",opts:["需要","须要"],ans:0,tip:"「需要」是应该有或必须有，强调需求；「须要」是一定要、必须要。"},
  {q:"在实验室__严格遵守操作规程。",opts:["需要","须要"],ans:1,tip:"强调一定要、必须如此，用「须要」。"},

  // ── 以致 / 以至 ──
  {q:"他没复习，__考试不及格。",opts:["以致","以至"],ans:0,tip:"「以致」引出不好的结果，含「导致」之意；「以至」表示延伸或达到某种程度。"},
  {q:"学习要从简单__复杂，循序渐进。",opts:["以致","以至"],ans:1,tip:"表示范围的延伸（从…到…），用「以至」。"},
  {q:"他太紧张了，__发挥失常。",opts:["以致","以至"],ans:0,tip:"引出不好的结果，用「以致」。"},

  // ── 分辨 / 分辩 ──
  {q:"很难__这对双胞胎谁是姐姐。",opts:["分辨","分辩"],ans:0,tip:"「分辨」是区分辨别；「分辩」是为自己辩白、解释。"},
  {q:"他没有做错，不需要向任何人__。",opts:["分辨","分辩"],ans:1,tip:"为自己辩解、澄清用「分辩」。"},

  // ── 截止 / 截至 ──
  {q:"报名__日期为本周五。",opts:["截止","截至"],ans:0,tip:"「截止」表示到某一时间停止；「截至」表示到某一时间为止（可能还在继续）。"},
  {q:"__昨天，已有三千人报名。",opts:["截止","截至"],ans:1,tip:"到昨天为止的统计，事情可能还在继续，用「截至」。"},
  {q:"优惠活动将于月底__。",opts:["截止","截至"],ans:0,tip:"停止、终止用「截止」。"},

  // ── 检查 / 检察 ──
  {q:"医生仔细__了病人的伤口。",opts:["检查","检察"],ans:0,tip:"「检查」是一般地查看、检验；「检察」是特指法律监督机关的审查活动。"},
  {q:"检察机关依法履行法律__职责。",opts:["检查","检察"],ans:1,tip:"「检察」是法律术语，特指检察机关的法律监督。"},

  // ── 篡改 / 窜改 ──
  {q:"有人恶意__数据，造成严重损失。",opts:["篡改","窜改"],ans:0,tip:"「篡改」是用作伪的手段改动（经典、理论、政策等），含贬义；「窜改」是改动文字、文件等。"},
  {q:"这篇文章经过多次__，已面目全非。",opts:["篡改","窜改"],ans:1,tip:"改动文字内容用「窜改」，不一定含恶意。"},

  // ── 度过 / 渡过 ──
  {q:"我们一起__了一个愉快的周末。",opts:["度过","渡过"],ans:0,tip:"「度过」用于时间；「渡过」用于空间上的横越（如渡河），或比喻度过难关。"},
  {q:"在大家的帮助下，他终于__了难关。",opts:["度过","渡过"],ans:1,tip:"「渡过难关」是固定搭配，用「渡过」。"},
  {q:"在这里__的每一天都很充实。",opts:["度过","渡过"],ans:0,tip:"涉及时间的经过，用「度过」。"},

  // ── 中止 / 终止 ──
  {q:"合同到期后自动__。",opts:["中止","终止"],ans:1,tip:"「终止」是最终结束、停止；「中止」是中途暂停，可能恢复。"},

  {q:"双方同意__合作关系。",opts:["中止","终止"],ans:1,tip:"彻底结束用「终止」。"},

  // ── 启用 / 起用 ──
  {q:"新机场将于下月正式__。",opts:["启用","起用"],ans:0,tip:"「启用」是开始使用（物、设施）；「起用」是重新任用已退职或免职的人员，也指提拔新人。"},
  {q:"公司董事会决定__一批年轻干部。",opts:["启用","起用"],ans:1,tip:"提拔任用人员用「起用」。"},

  // ── 树立 / 竖立 ──
  {q:"我们要__正确的人生观和价值观。",opts:["树立","竖立"],ans:0,tip:"「树立」用于抽象的好的事物（榜样、信心、观念等）；「竖立」是具体物体直立起来。"},
  {q:"广场上__着一根旗杆。",opts:["树立","竖立"],ans:1,tip:"具体物体直立用「竖立」。"},

  // ── 包括 / 囊括 ──
  {q:"本次展览__了从古代到现代的各类艺术品。",opts:["包括","囊括"],ans:0,tip:"「包括」是包含在内；「囊括」是把全部包罗在内，含全部拿下的意思。"},
  {q:"中国队__了乒乓球项目的全部金牌。",opts:["包括","囊括"],ans:1,tip:"全部包揽用「囊括」。"},

  // ── 保障 / 保证 ──
  {q:"社会保障制度是人民生活的__。",opts:["保障","保证"],ans:0,tip:"「保障」是保护使不受侵害；「保证」是担保做到。"},
  {q:"我__明天一定完成这个任务。",opts:["保障","保证"],ans:1,tip:"担保、承诺做到用「保证」。"},
  {q:"发展经济是__民生的基础。",opts:["保障","保证"],ans:0,tip:"保护、维护用「保障」。"},

  // ── 采用 / 采纳 ──
  {q:"工厂__了最新的生产工艺。",opts:["采用","采纳"],ans:0,tip:"「采用」指认为合适而选用（技术、方法、工具等）；「采纳」指接受（意见、建议、方案）。"},
  {q:"领导__了大家的合理化建议。",opts:["采用","采纳"],ans:1,tip:"接受建议、意见用「采纳」。"},

  // ── 呈现 / 展现 ──
  {q:"这部作品__了当代社会的多元面貌。",opts:["呈现","展现"],ans:0,tip:"「呈现」是显现出、展示在眼前；「展现」是展示出来让人看到，主动性更强。"},
  {q:"打开画卷，一幅美丽的山水图__在眼前。",opts:["呈现","展现"],ans:1,tip:"展示出来，用「展现」。"},
  {q:"各项数据__出良好的发展态势。",opts:["呈现","展现"],ans:0,tip:"客观显现出某种状态，用「呈现」。"},

  // ── 充分 / 充足 ──
  {q:"我们有__的理由相信这件事能成功。",opts:["充分","充足"],ans:0,tip:"「充分」多用于抽象事物如理由、准备、信心；「充足」多用于具体事物如阳光、粮食、资金。"},
  {q:"保证市场供应__，物价稳定。",opts:["充分","充足"],ans:1,tip:"物品数量足够用「充足」。"},
  {q:"准备工作做得非常__。",opts:["充分","充足"],ans:0,tip:"「充分」修饰准备、发挥等抽象概念。"},

  // ── 发展 / 发达 ──
  {q:"近年来，中国的高铁技术__迅速。",opts:["发展","发达"],ans:0,tip:"「发展」是动词，指事物由小到大、由低到高的变化过程；「发达」是形容词，指已经充分发展的状态。"},
  {q:"上海是一个经济非常__的城市。",opts:["发展","发达"],ans:1,tip:"形容词，描述已经很先进的状态，用「发达」。"},

  // ── 改进 / 改善 ──
  {q:"我们要不断__工作方法。",opts:["改进","改善"],ans:0,tip:"「改进」侧重于改变旧的不好的，使之进步；「改善」侧重于使原有状况变得更好。"},
  {q:"政府出台政策努力__民生。",opts:["改进","改善"],ans:1,tip:"「改善民生」是固定搭配。"},
  {q:"厂家根据用户反馈__了产品设计。",opts:["改进","改善"],ans:0,tip:"改变原有设计使之更好，用「改进」。"},

  // ── 规划 / 计划 ──
  {q:"国家制定了十四五__纲要。",opts:["规划","计划"],ans:0,tip:"「规划」是比较全面的长远的发展蓝图；「计划」是较短期的、具体的工作安排。"},
  {q:"我__下个月去北京出差。",opts:["规划","计划"],ans:1,tip:"个人短期的具体安排用「计划」。"},
  {q:"城市建设需要科学__。",opts:["规划","计划"],ans:0,tip:"长远的、全局性的安排用「规划」。"},

  // ── 鼓励 / 鼓舞 ──
  {q:"老师经常__学生多读课外书。",opts:["鼓励","鼓舞"],ans:0,tip:"「鼓励」是激发、勉励（一般是人对人）；「鼓舞」是使人振作、增强信心（可以是事物）。"},
  {q:"这个消息令人__。",opts:["鼓励","鼓舞"],ans:1,tip:"「令人鼓舞」是固定搭配。"},

  // ── 成果 / 后果 / 结果 ──
  {q:"这项研究取得了丰硕的__。",opts:["成果","后果","结果"],ans:0,tip:"「成果」是褒义词，指工作或事业的收获；「后果」多含贬义；「结果」中性。"},
  {q:"谁都不能预料这件事的__。",opts:["成果","后果","结果"],ans:2,tip:"中性表达，用「结果」。"},
  {q:"破坏环境的__由全人类共同承担。",opts:["成果","后果","结果"],ans:1,tip:"含贬义的不好的结局，用「后果」。"},

  // ── 推广 / 推行 ──
  {q:"这项新技术值得向全国__。",opts:["推广","推行"],ans:0,tip:"「推广」侧重于扩大使用范围或影响范围；「推行」侧重于推动执行（政策、制度等）。"},
  {q:"国家__九年义务教育制度。",opts:["推广","推行"],ans:1,tip:"推动政策、制度的实行用「推行」。"},

  // ── 短缺 / 缺乏 ──
  {q:"这个地区水资源__。",opts:["短缺","缺乏"],ans:0,tip:"「短缺」多用于具体物资，指数量不足；「缺乏」可用于抽象或具体，指没有或不够。"},
  {q:"他__工作经验，需要多锻炼。",opts:["短缺","缺乏"],ans:1,tip:"抽象事物的不足用「缺乏」。"},

  // ── 震动 / 振动 ──
  {q:"这个消息__了全国。",opts:["震动","振动"],ans:0,tip:"「震动」是使颤动，引申为使人心不平静；「振动」是物理学上的机械振动。"},
  {q:"手机调成__模式。",opts:["震动","振动"],ans:1,tip:"物理学上的往复运动用「振动」。"},

  // ── 接收 / 接受 ──
  {q:"他__了这份礼物。",opts:["接收","接受"],ans:1,tip:"「接受」是对事物容纳不拒绝；「接收」是收受、接纳（信号、新成员等）。"},
  {q:"这台设备可以__卫星信号。",opts:["接收","接受"],ans:0,tip:"收取信号用「接收」。"},
  {q:"我们要虚心__别人的意见。",opts:["接收","接受"],ans:1,tip:"对意见等不拒绝，用「接受」。"},

  {q:"请__一下你是否参加明天的会议。",opts:["确定","确认"],ans:1,tip:"「确认」是进一步核实明确；「确定」是明确而肯定。"},
  {q:"最终方案已经__下来了。",opts:["确定","确认"],ans:0,tip:"定下来、明确下来用「确定」。"},

  // ── 发布 / 发表 ──
  {q:"政府__了最新的经济数据。",opts:["发布","发表"],ans:0,tip:"「发布」是公布（新闻、命令、指标等）；「发表」是公开表达（意见、文章等）。"},
  {q:"他在杂志上__了一篇学术论文。",opts:["发布","发表"],ans:1,tip:"公开表达观点或刊登文章用「发表」。"},

  // ── 引导 / 导致 ──
  {q:"老师要正确__学生的学习方向。",opts:["引导","导致"],ans:0,tip:"「引导」是带领、指引（中性或褒义）；「导致」是引起（多含贬义）。"},
  {q:"管理不善__了项目失败。",opts:["引导","导致"],ans:1,tip:"引起不好的结果用「导致」。"},

  // ── 机制 / 体制 ──
  {q:"要完善市场监督__。",opts:["机制","体制"],ans:0,tip:"「机制」是系统内部组织和运行的规律/方式；「体制」是组织制度、体系结构。"},
  {q:"深化行政管理__改革。",opts:["机制","体制"],ans:1,tip:"组织制度和体系结构用「体制」。"},

  // ── 内涵 / 含义 ──
  {q:"要深刻理解这句话的__。",opts:["内涵","含义"],ans:1,tip:"「含义」是词句等包含的意义；「内涵」是事物内在的、本质的内容。"},
  {q:"中华文化有丰富的__。",opts:["内涵","含义"],ans:0,tip:"内在的、本质性的内容，用「内涵」更贴切。"},

  // ── 甚至 / 尤其 ──
  {q:"他学习很努力，__周末也不休息。",opts:["甚至","尤其"],ans:0,tip:"「甚至」表示递进，强调更极端的情况；「尤其」表示在同类中更加突出。"},
  {q:"他喜欢运动，__是篮球。",opts:["甚至","尤其"],ans:1,tip:"在同类事物中更突出地用「尤其」。"},

  // ── 从而 / 进而 ──
  {q:"先学好基础，__深入学习专业知识。",opts:["从而","进而"],ans:1,tip:"「进而」表示在前一行动的基础上继续前进；「从而」表示因果关系，前面是方法，后面是结果。"},
  {q:"优化了算法，__提高了运算速度。",opts:["从而","进而"],ans:0,tip:"前面是方法手段，后面是它带来的结果，用「从而」。"},

  // ── 因为 / 由于 ──
  {q:"__天气原因，航班延误了。",opts:["因为","由于"],ans:1,tip:"「由于」多用于书面语、正式场合；「因为」口语化。"},
  {q:"我__喜欢才去做这件事。",opts:["因为","由于"],ans:0,tip:"口语化表达原因用「因为」。"},

  // ── 何况 / 况且 ──
  {q:"他连基础都没学，__这么难的内容？",opts:["何况","况且"],ans:0,tip:"「何况」用反问语气表示更进一层；「况且」是陈述语气，补充理由。"},
  {q:"天太晚了，__又下雨了，就别出门了。",opts:["何况","况且"],ans:1,tip:"补充追加理由用「况且」。"},

  // ── 忽视 / 忽略 ──
  {q:"安全问题不容__。",opts:["忽视","忽略"],ans:0,tip:"「忽视」是有意或无意地不重视；「忽略」多指因为疏忽而没有注意到。"},
  {q:"一个标点符号都不能__。",opts:["忽视","忽略"],ans:1,tip:"因疏忽而遗漏用「忽略」。"},

  // ── 推脱 / 推托 ──
  {q:"不要总是__责任。",opts:["推脱","推托"],ans:0,tip:"「推脱」是推卸、摆脱（责任、义务等）；「推托」是借故拒绝（邀请、要求等）。"},
  {q:"他__说身体不舒服，没来参加聚会。",opts:["推脱","推托"],ans:1,tip:"借故推辞、婉拒用「推托」。"},

  // ── 简洁 / 简捷 ──
  {q:"他的文章__明了，通俗易懂。",opts:["简洁","简捷"],ans:0,tip:"「简洁」是说话行文简明扼要，没有多余内容；「简捷」是简便快捷。"},
  {q:"用最__的方法解决这个问题。",opts:["简洁","简捷"],ans:1,tip:"简便快捷用「简捷」。"},

  // ── 开拓 / 开辟 ──
  {q:"我们要不断__创新，敢为人先。",opts:["开拓","开辟"],ans:0,tip:"「开拓」侧重在原有基础上扩展；「开辟」侧重从无到有地开创。"},
  {q:"丝绸之路__了东西方贸易的新通道。",opts:["开拓","开辟"],ans:1,tip:"从无到有地开创，用「开辟」。"},

  // ── 夸张 / 夸大 ──
  {q:"他这个说法太__了，别当真。",opts:["夸张","夸大"],ans:0,tip:"「夸张」是言过其实，常作为一种修辞；「夸大」是把事情说得超过了原有程度，多含贬义。"},
  {q:"故意__成绩、隐瞒问题是不可取的。",opts:["夸张","夸大"],ans:1,tip:"有目的地把事情说大，含贬义，用「夸大」。"},

  // ── 流传 / 留传 ──
  {q:"这个民间故事已经__了好几百年。",opts:["流传","留传"],ans:0,tip:"「流传」是传下来或传播开（故事、消息等）；「留传」是遗留下来传给后代（物品、财产等）。"},
  {q:"祖先__下来的珍宝。",opts:["流传","留传"],ans:1,tip:"遗留下来的具体物品用「留传」。"},

  // ── 诞生 / 诞辰 ──
  {q:"2024年是孔子__2575周年。",opts:["诞生","诞辰"],ans:1,tip:"「诞辰」是生日（用于所尊敬的人）；「诞生」是出生（动词）。"},
  {q:"中国共产党于1921年__。",opts:["诞生","诞辰"],ans:0,tip:"出生、成立用动词「诞生」。"},

  // ── 国是 / 国事 ──
  {q:"两会期间，代表们共商__。",opts:["国是","国事"],ans:0,tip:"「国是」指国家大计、大政方针；「国事」指国家的事务。「共商国是」是固定搭配。"},
  {q:"国家主席进行__访问。",opts:["国是","国事"],ans:1,tip:"国家事务、外交活动用「国事」。"},

  // ── 预定 / 预订 ──
  {q:"我们__了下周的酒店。",opts:["预定","预订"],ans:1,tip:"「预订」是预先订购、订租；「预定」是预先规定或约定。"},
  {q:"比赛在__的时间准时开始。",opts:["预定","预订"],ans:0,tip:"预先规定的时间用「预定」。"},

  // ── 做客 / 作客 ──
  {q:"周末去朋友家__。",opts:["做客","作客"],ans:0,tip:"「做客」是到别人家拜访；「作客」是在外地寄居。"},
  {q:"独在异乡为异__。",opts:["做客","作客"],ans:1,tip:"寄居他乡用「作客」。"},

  // ── 谋取 / 牟取 ──
  {q:"为广大人民__幸福。",opts:["谋取","牟取"],ans:0,tip:"「谋取」是设法取得，中性词；「牟取」是非法或不正当地获取，贬义词。"},
  {q:"不法商家__暴利。",opts:["谋取","牟取"],ans:1,tip:"用不正当手段获取利益，用「牟取」。"},

  // ── 质疑 / 置疑 ──
  {q:"对不合理的现象提出__。",opts:["质疑","置疑"],ans:0,tip:"「质疑」是提出疑问；「置疑」是怀疑（多用于否定式）。"},
  {q:"这个事实不容__。",opts:["质疑","置疑"],ans:1,tip:"「不容置疑」是固定搭配。"},

  // ── 装饰 / 妆饰 ──
  {q:"新房里__得很温馨。",opts:["装饰","妆饰"],ans:0,tip:"「装饰」是对身体或物体的表面进行美化；「妆饰」是特指对人的打扮。"},
  {q:"她精心__了一番才出门。",opts:["装饰","妆饰"],ans:1,tip:"对人进行打扮用「妆饰」。"},

  // ── 溶化 / 融化 / 熔化 ──
  {q:"春天来了，冰雪开始__。",opts:["溶化","融化","熔化"],ans:1,tip:"冰雪变成水用「融化」；「溶化」是固体在液体中溶解；「熔化」是固体加热变成液体。"},
  {q:"铁在高温下__成铁水。",opts:["溶化","融化","熔化"],ans:2,tip:"固体加热变为液体用「熔化」。"},
  {q:"把糖放进水里，很快就__了。",opts:["溶化","融化","熔化"],ans:0,tip:"在液体中溶解用「溶化」。"},

  // ── 徘徊 / 徜徉 ──
  {q:"他在门口__了很久，不知该不该进去。",opts:["徘徊","徜徉"],ans:0,tip:"「徘徊」是在一个地方来回走，比喻犹豫不决；「徜徉」是悠闲自在地行走。"},
  {q:"在花海中__，十分惬意。",opts:["徘徊","徜徉"],ans:1,tip:"悠闲自在地行走用「徜徉」。"},

  // ── 不只 / 不止 ──
  {q:"他__是老师，还是作家。",opts:["不只","不止"],ans:0,tip:"「不只」是连词，相当于「不但」「不仅」；「不止」是动词，表示不停止或超出某个数量。"},
  {q:"教室里__五十个人。",opts:["不只","不止"],ans:1,tip:"超出某个数量用「不止」。"},

  // ── 本义 / 本意 ──
  {q:"这个词的__是指一种工具。",opts:["本义","本意"],ans:0,tip:"「本义」是词语本来的意思；「本意」是说话或做事的本来意图。"},
  {q:"我的__是好的，没想到被误解了。",opts:["本义","本意"],ans:1,tip:"本来意图、心意用「本意」。"},

  {q:"他勾结外人，暗中__，损害公司利益。",opts:["沟通","勾通"],ans:1,tip:"暗中勾结串通用「勾通」，含贬义。"},
];

// ===================== 游戏状态 =====================
const TOTAL_QUESTIONS = 20;
const TIME_PER_Q = 12;
const BASE_SCORE = 100;
const TIME_BONUS_MAX = 50;
const COMBO_BONUS = 20;

let state = { mode:null, questions:[], idx:0, score:0, combo:0, maxCombo:0, lives:5, correctCount:0, wrongCount:0, answered:false, timer:null, timeLeft:0 };

function loadStats() {
  try { return JSON.parse(localStorage.getItem('wordgame_stats') || '{"totalQ":0,"bestCombo":0}'); }
  catch(e) { return {totalQ:0, bestCombo:0}; }
}
function saveStats(s) { localStorage.setItem('wordgame_stats', JSON.stringify(s)); }
function loadWrongBook() {
  try { return JSON.parse(localStorage.getItem('wordgame_wrong') || '[]'); }
  catch(e) { return []; }
}
function saveWrongBook(w) { localStorage.setItem('wordgame_wrong', JSON.stringify(w)); }

function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickRandom(arr,n) { return shuffle(arr).slice(0,Math.min(n,arr.length)); }

function refreshHome() {
  const stats = loadStats();
  document.getElementById('statTotal').textContent = stats.totalQ||0;
  document.getElementById('statBest').textContent = stats.bestCombo||0;
  document.getElementById('statWrong').textContent = loadWrongBook().length;
}

function startChallenge() { startGame('challenge'); }
function startPractice() { startGame('practice'); }

function startGame(mode) {
  state = { mode, questions:pickRandom(WORD_BANK, TOTAL_QUESTIONS), idx:0, score:0, combo:0, maxCombo:0, lives:mode==='challenge'?5:999, correctCount:0, wrongCount:0, answered:false, timer:null, timeLeft:TIME_PER_Q };
  showScreen('gameScreen');
  renderHearts();
  updateScore();
  showQuestion();
}

function showScreen(id) {
  ['homeScreen','gameScreen','resultScreen','reviewScreen'].forEach(s => document.getElementById(s).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderHearts() {
  if (state.mode==='practice') { document.getElementById('hearts').innerHTML='<span style="font-size:14px;color:var(--blue);line-height:1.8">∞ 练习模式</span>'; return; }
  let h=''; for(let i=0;i<5;i++) h+=`<span class="heart${i>=state.lives?' lost':''}">❤️</span>`;
  document.getElementById('hearts').innerHTML=h;
}

function updateScore() {
  document.getElementById('scoreDisplay').textContent=state.score;
  const cd=document.getElementById('comboDisplay');
  if(state.combo>=3){cd.textContent=`🔥 ${state.combo}连击! +${COMBO_BONUS*(state.combo-1)}`;cd.className='combo big';setTimeout(()=>cd.className='combo',500);}
  else if(state.combo>0){cd.textContent=state.combo>=2?`连击 x${state.combo}`:'';cd.className='combo';}
  else{cd.textContent='';cd.className='combo';}
}

function showQuestion() {
  if(state.idx>=state.questions.length) return endGame(true);
  const q=state.questions[state.idx];
  state.answered=false; state.timeLeft=TIME_PER_Q;
  document.getElementById('progressBar').style.width=(state.idx/TOTAL_QUESTIONS*100)+'%';
  document.getElementById('qNum').textContent=`第 ${state.idx+1}/${TOTAL_QUESTIONS} 题`;
  document.getElementById('qText').innerHTML=q.q.replace(/__/g,'<span class="blank">______</span>');
  const qCard=document.getElementById('qCard'); qCard.className='q-card';
  document.getElementById('explain').className='explain';

  const shuffled=q.opts.map((w,i)=>({w,i})).sort(()=>Math.random()-0.5);
  document.getElementById('options').innerHTML=shuffled.map((item,idx)=>`<button class="option" data-idx="${idx}" data-correct="${item.i===q.ans}" data-word="${item.w}">${item.w}</button>`).join('');
  document.querySelectorAll('#options .option').forEach(btn=>{btn.addEventListener('click',()=>handleAnswer(btn));});

  document.onkeydown=function(e){
    if(state.answered){if(e.key==='Enter'||e.key===' '){nextQuestion();e.preventDefault();}return;}
    const key=parseInt(e.key);
    if(key>=1&&key<=shuffled.length){const btn=document.querySelectorAll('#options .option')[key-1];if(btn)handleAnswer(btn);}
  };
  startTimer();
}

function startTimer(){
  clearInterval(state.timer);
  const fill=document.getElementById('timerFill'); fill.style.width='100%'; fill.className='fill';
  const startTime=Date.now(), totalMs=TIME_PER_Q*1000;
  state.timer=setInterval(()=>{
    const remaining=Math.max(0,totalMs-(Date.now()-startTime));
    state.timeLeft=remaining/1000;
    const pct=remaining/totalMs*100;
    fill.style.width=pct+'%';
    if(pct<30)fill.className='fill danger'; else if(pct<55)fill.className='fill warning';
    if(remaining<=0){clearInterval(state.timer);if(!state.answered)timeUp();}
  },100);
}

function timeUp(){
  if(state.answered)return;
  state.answered=true; clearInterval(state.timer);
  const q=state.questions[state.idx];
  document.querySelectorAll('#options .option').forEach(btn=>{btn.classList.add('disabled');if(btn.dataset.correct==='true')btn.classList.add('show-correct');});
  state.combo=0; state.wrongCount++; updateScore();
  document.getElementById('qCard').classList.add('wrong');
  if(state.mode==='challenge'){state.lives--;renderHearts();if(state.lives<=0){setTimeout(()=>endGame(false),1200);return;}}
  addToWrongBook(q);
  showExplanation(q,true);
}

function handleAnswer(btn){
  if(state.answered)return;
  state.answered=true; clearInterval(state.timer);
  const isCorrect=btn.dataset.correct==='true';
  const q=state.questions[state.idx];
  document.querySelectorAll('#options .option').forEach(b=>{b.classList.add('disabled');if(b.dataset.correct==='true')b.classList.add('show-correct');});
  const timeBonus=Math.floor((state.timeLeft/TIME_PER_Q)*TIME_BONUS_MAX);
  const comboBonus=state.combo>=2?COMBO_BONUS*(state.combo-1):0;

  if(isCorrect){
    state.combo++; state.correctCount++;
    if(state.combo>state.maxCombo)state.maxCombo=state.combo;
    state.score+=BASE_SCORE+timeBonus+comboBonus;
    document.getElementById('qCard').classList.add('correct');
    btn.classList.add('chosen-correct');
  }else{
    state.combo=0; state.wrongCount++;
    if(state.mode==='challenge'){state.lives--;renderHearts();}
    document.getElementById('qCard').classList.add('wrong');
    btn.classList.add('chosen-wrong');
    addToWrongBook(q);
  }
  updateScore();
  if(state.mode==='challenge'&&state.lives<=0){setTimeout(()=>endGame(false),1200);showExplanation(q,!isCorrect);return;}
  showExplanation(q,!isCorrect);
}

function showExplanation(q,showTip){
  const el=document.getElementById('explain');
  el.innerHTML=`<div class="tip-label">✅ 正确答案：${q.opts[q.ans]}</div><div class="tip-text">💡 ${q.tip}</div><div class="next-hint">按 Enter 或点击屏幕继续 →</div>`;
  el.classList.add('show');
  setTimeout(()=>document.addEventListener('click',function goNext(){document.removeEventListener('click',goNext);nextQuestion();}),200);
}

function nextQuestion(){
  state.idx++;
  if(state.idx>=state.questions.length)endGame(true);
  else{document.getElementById('explain').classList.remove('show');showQuestion();}
}

function endGame(completed){
  clearInterval(state.timer); state.answered=true;
  const stats=loadStats();
  stats.totalQ=(stats.totalQ||0)+state.correctCount+state.wrongCount;
  if(state.maxCombo>(stats.bestCombo||0))stats.bestCombo=state.maxCombo;
  saveStats(stats);

  const accuracy=state.correctCount+state.wrongCount>0?Math.round(state.correctCount/(state.correctCount+state.wrongCount)*100):0;
  const emoji=document.getElementById('resultEmoji'),title=document.getElementById('resultTitle'),sub=document.getElementById('resultSub');

  if(state.mode==='challenge'&&state.lives<=0){emoji.textContent='💔';title.textContent='闯关失败';sub.textContent=`答对了 ${state.correctCount} 题`;}
  else if(accuracy>=90){emoji.textContent='🏆';title.textContent='太厉害了！';sub.textContent=`正确率 ${accuracy}%`;}
  else if(accuracy>=70){emoji.textContent='👍';title.textContent='表现不错！';sub.textContent=`正确率 ${accuracy}%`;}
  else if(accuracy>=50){emoji.textContent='📖';title.textContent='还需努力';sub.textContent=`正确率 ${accuracy}%`;}
  else{emoji.textContent='💪';title.textContent='继续加油';sub.textContent=`正确率 ${accuracy}%`;}

  document.getElementById('resScore').textContent=state.score;
  document.getElementById('resCorrect').textContent=state.correctCount;
  document.getElementById('resWrong').textContent=state.wrongCount;
  document.getElementById('resStreak').textContent=state.maxCombo;
  showScreen('resultScreen');
}

function addToWrongBook(q){
  const book=loadWrongBook();
  if(!book.some(item=>item.q===q.q&&item.opts.join(',')===q.opts.join(','))){book.push(q);saveWrongBook(book);}
}

function showReview(){
  const book=loadWrongBook();
  const list=document.getElementById('reviewList');
  if(book.length===0){list.innerHTML='<div class="review-empty"><div class="icon">🎉</div><p>还没有错题，继续保持！</p></div>';}
  else{list.innerHTML=book.reverse().map((q,i)=>`<div class="review-item"><div class="q">${book.length-i}. ${q.q.replace('__','____')}</div><div class="a">✅ <b>${q.opts[q.ans]}</b></div><div class="tip">💡 ${q.tip}</div></div>`).join('');}
  showScreen('reviewScreen');
}

function goHome(){clearInterval(state.timer);refreshHome();showScreen('homeScreen');document.onkeydown=null;}
function resetData(){if(confirm('确定要清除所有记录和错题本吗？')){localStorage.removeItem('wordgame_stats');localStorage.removeItem('wordgame_wrong');refreshHome();}}

refreshHome();
</script>
